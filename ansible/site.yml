---
- name: Wait for nodes to become reachable
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSH to wake up
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 300
        connect_timeout: 5

- name: Configure BGP Networking
  hosts: all
  become: true
  roles:
    - bird
