---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: true

- name: Comment out swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Create modules-load configuration
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'

- name: Load modules into kernel
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Set sysctl parameters for K8s networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/k8s.conf
  loop:
    - {key: 'net.bridge.bridge-nf-call-iptables', value: '1'}
    - {key: 'net.bridge.bridge-nf-call-ip6tables', value: '1'}
    - {key: 'net.ipv4.ip_forward', value: '1'}

- name: Set additional sysctl parameters for HA networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "0"
    state: present
    reload: false
    sysctl_file: /etc/sysctl.d/99-k8s-network.conf
  loop:
    - {key: 'net.ipv4.conf.all.send_redirects'}
    - {key: 'net.ipv4.conf.default.send_redirects'}
    - {key: 'net.ipv4.conf.ens4.send_redirects'}
    - {key: 'net.ipv4.conf.ens3.send_redirects'}

- name: Install Containerd
  ansible.builtin.apt:
    name: containerd
    state: present
    update_cache: true

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Get default containerd config
  ansible.builtin.command: containerd config default
  register: containerd_config_default
  changed_when: false

- name: Write containerd config to file
  ansible.builtin.copy:
    content: "{{ containerd_config_default.stdout }}"
    dest: /etc/containerd/config.toml
    mode: '0644'

- name: Enable SystemdCgroup and set pause image
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  loop:
    - regexp: 'SystemdCgroup = false'
      replace: 'SystemdCgroup = true'
    - regexp: 'sandbox_image = "registry.k8s.io/pause:3.8"'
      replace: 'sandbox_image = "registry.k8s.io/pause:3.9"'

- name: Ensure containerd is running for image pull
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true

- name: Install Apt Dependencies
  ansible.builtin.apt:
    name: [apt-transport-https, ca-certificates, curl, gnupg]
    state: present

- name: Download K8s GPG Key
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'

- name: Add Kubernetes Repository
  ansible.builtin.apt_repository:
    repo: >
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc]
      https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /
    state: present
    filename: kubernetes

- name: Install K8s Tools
  ansible.builtin.apt:
    name: [kubeadm, kubelet, kubectl]
    state: present
    update_cache: true

- name: Hold K8s Packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: [kubelet, kubeadm, kubectl]
