---
- name: Pre-pull Kubernetes images for fast init
  ansible.builtin.command: >
    kubeadm config images pull --kubernetes-version v1.29.15
  changed_when: true

- name: Set active master for initialization
  ansible.builtin.set_fact:
    # We take the first host from the list of those who are on the network
    first_available_master: "{{ ansible_play_hosts | first }}"
  run_once: true

- name: Check for kubelet config (Any K8s node)
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: k8s_joined

- name: Check for admin config (Control-plane leader only)
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init

- name: Identify an active control-plane leader
  ansible.builtin.set_fact:
    active_admin_node: "{{ ansible_play_hosts | map('extract', hostvars) | selectattr('k8s_init.stat.exists', 'equalto', true) | map(attribute='inventory_hostname') | list | first | default(first_available_master) }}"
  run_once: true

- name: Set global cluster status facts
  ansible.builtin.set_fact:
    # We check if the file exists on at least one master, which means the cluster is already initialized
    any_master_initialized: "{{ groups['masters'] | map('extract', hostvars, ['k8s_joined', 'stat', 'exists']) | select('true') | list | length > 0 }}"
    # We check if the file does not exist on any master, which means the cluster is not initialized at all
    all_masters_empty: "{{ groups['masters'] | map('extract', hostvars, ['k8s_joined', 'stat', 'exists']) | select('true') | list | length == 0 }}"
  run_once: true

- name: Initialize first master
  ansible.builtin.command: >
    kubeadm init
    --control-plane-endpoint "{{ cluster_internal_vip }}:6443"
    --apiserver-cert-extra-sans="{{ cluster_internal_vip }},{{ cluster_external_vip }},127.0.0.1,{{ inventory_hostname }}"
    --upload-certs
    --apiserver-advertise-address={{ internal_ip }}
    --apiserver-bind-port {{ k8s_apiserver_bind_port }}
    --pod-network-cidr={{ pod_network_cidr }}
    --node-name {{ inventory_hostname }}
  register: kubeadm_init_raw
  when:
    - inventory_hostname == first_available_master
    - all_masters_empty
  args:
    creates: /etc/kubernetes/admin.conf

- name: Setup kubeconfig and fetch to local machine
  block:
    - name: Create .kube directory
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Fetch kubeconfig to local machine
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "./k8s_admin.conf"
        flat: true
      when: k8s_init.stat.exists
      run_once: true

    - name: Copy admin.conf from CI runner to all masters
      ansible.builtin.copy:
        src: "./k8s_admin.conf"
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: false
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

- name: Generate join facts
  when: inventory_hostname == active_admin_node
  block:
    - name: Get join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: worker_join_raw
      changed_when: false

    - name: Get certificate key
      ansible.builtin.shell: |
        set -o pipefail
        kubeadm init phase upload-certs --upload-certs | tail -n 1
      args:
        executable: /bin/bash
      register: cert_key_raw
      changed_when: false

    - name: Share join facts with all hosts
      ansible.builtin.set_fact:
        master_join_cmd: "{{ worker_join_raw.stdout }} --control-plane --certificate-key {{ cert_key_raw.stdout }} --apiserver-bind-port {{ k8s_apiserver_bind_port }}"
        worker_join_cmd_fact: "{{ worker_join_raw.stdout }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

- name: Join other masters
  ansible.builtin.command: >
    {{ hostvars[active_admin_node]['master_join_cmd'] }}
    --node-name {{ inventory_hostname }}
    --apiserver-advertise-address={{ internal_ip }}
  when:
    - inventory_hostname in groups['masters']
    - inventory_hostname != active_admin_node
    - not k8s_joined.stat.exists
  args:
    creates: /etc/kubernetes/kubelet.conf
