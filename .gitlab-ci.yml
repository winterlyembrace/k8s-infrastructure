stages:
  - validate
  - plan
  - apply
  - provision

variables:
  # --- Tools versions ---
  TF_VER: "1.7.5"
  ANSIBLE_VER: "2.16"
  ANSIBLE_LINT_VER: "v24.2.0"

  # --- Full image path ---
  TF_IMAGE: "hashicorp/terraform:${TF_VER}"
  ANSIBLE_IMAGE: "cytopia/ansible:${ANSIBLE_VER}"
  ANSIBLE_LINT_IMAGE: "ansible/ansible-lint-action:${ANSIBLE_LINT_VER}"

  # --- Settings ---
  TF_ROOT: "terraform"
  ANSIBLE_ROOT: "ansible"
  ANSIBLE_HOST_KEY_CHECKING: "False"

terraform_validate:
  stage: validate
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

ansible_lint:
  stage: validate
  image: ${ANSIBLE_LINT_IMAGE}
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - ansible-lint site.yml

terraform_plan:
  stage: plan
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan
    expire_in: 1 hour

terraform_apply:
  stage: apply
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform apply -auto-approve tfplan
    - terraform output -json ansible_inventory > ../$ANSIBLE_ROOT/inventory.json  
  when: manual
  allow_failure: false  
  dependencies:
    - terraform_plan
  artifacts:
    paths:
      - $ANSIBLE_ROOT/inventory.json

ansible_run:
  stage: provision
  image: ${ANSIBLE_IMAGE}
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - sleep 30 
    - ansible-playbook -i inventory.json site.yml --private-key=$SSH_PRIVATE_KEY
  dependencies:
    - terraform_apply
