stages:
  - validate
  - plan
  - apply
  - provision

variables:
  # --- Tools versions ---
  TF_VER: "1.7.5"
  ANSIBLE_VER: "2.16"
  ANSIBLE_LINT_VER: "0.20.0"

  # --- Full image path ---
  TF_IMAGE: "hashicorp/terraform:${TF_VER}"
  ANSIBLE_IMAGE: "cytopia/ansible:${ANSIBLE_VER}"
  ANSIBLE_LINT_IMAGE: "pipelinecomponents/ansible-lint:${ANSIBLE_LINT_VER}"

  # --- Settings ---
  TF_ROOT: "terraform"
  ANSIBLE_ROOT: "ansible"
  ANSIBLE_HOST_KEY_CHECKING: "False"
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.terraform.d/plugin-cache"
  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/production"

terraform_validate:
  stage: validate
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

ansible_lint:
  stage: validate
  image: ${ANSIBLE_LINT_IMAGE}
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - ansible-lint site.yml

terraform_plan:
  stage: plan
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init \
        -backend-config="address=${TF_ADDRESS}" \
        -backend-config="lock_address=${TF_ADDRESS}/lock" \
        -backend-config="unlock_address=${TF_ADDRESS}/lock" \
        -backend-config="username=${GITLAB_USER_LOGIN}" \
        -backend-config="password=${CI_JOB_TOKEN}" \
        -backend-config="lock_method=POST" \
        -backend-config="unlock_method=DELETE" \
        -backend-config="retry_wait_min=5"
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan
    expire_in: 1 hour

terraform_apply:
  stage: apply
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  before_script:
    - apk add --no-cache cdrkit
  script:
    - whoami
    - id
    - ls -ld /var/lib/libvirt/images
    - ls -l /var/lib/libvirt/images/noble-server-cloudimg-amd64.img || echo "Файла всё еще нет!"
    - cd $TF_ROOT
    - terraform init \
        -backend-config="address=${TF_ADDRESS}" \
        -backend-config="lock_address=${TF_ADDRESS}/lock" \
        -backend-config="unlock_address=${TF_ADDRESS}/lock" \
        -backend-config="username=${GITLAB_USER_LOGIN}" \
        -backend-config="password=${CI_JOB_TOKEN}" \
        -backend-config="lock_method=POST" \
        -backend-config="unlock_method=DELETE" \
        -backend-config="retry_wait_min=5"
    - terraform apply -auto-approve tfplan
    - terraform output -json ansible_inventory > ../ansible/inventory.json  
  when: manual
  allow_failure: false  
  dependencies:
    - terraform_plan
  artifacts:
    paths:
      - ansible/inventory.json

ansible_run:
  stage: provision
  image: ${ANSIBLE_IMAGE}
  tags:
    - cluster-runner
  script:
    - ls -la $ANSIBLE_ROOT/
    - cd $ANSIBLE_ROOT
    - sleep 30 
    - ansible-playbook -i inventory.json site.yml --private-key=$SSH_PRIVATE_KEY
  dependencies:
    - terraform_apply
