cache:
  key: terraform-plugins
  paths:
    - ${TF_ROOT}/.terraform.d/plugin-cache/

stages:
  - validate
  - plan
  - apply
  - provision

variables:
  # --- Tools versions ---
  TF_VER: "1.7.5"
  TFLINT_VER: "v0.50.3"
  CHECKOV_VER: "3.2.30"
  TFSEC_VER: "v1.28.5"
  ANSIBLE_VER: "2.15.9"
  ANSIBLE_LINT_VER: "24.2.0"
  YAMLLINT_VER: "1.33.0"

  # --- Full image paths ---
  TF_IMAGE: "hashicorp/terraform:${TF_VER}"
  TFLINT_IMAGE: "ghcr.io/terraform-linters/tflint:${TFLINT_VER}"
  CHECKOV_IMAGE: "bridgecrew/checkov:${CHECKOV_VER}"
  TFSEC_IMAGE: "aquasec/tfsec:${TFSEC_VER}"
  ANSIBLE_IMAGE: "willhallonline/ansible:${ANSIBLE_VER}-ubuntu"
  ANSIBLE_LINT_IMAGE: "ghcr.io/ansible/ansible-lint:v${ANSIBLE_LINT_VER}"
  YAMLLINT_IMAGE: "cytopia/yamllint:${YAMLLINT_VER}"

  # --- Settings ---
  TF_ROOT: "${CI_PROJECT_DIR}/terraform"
  ANSIBLE_ROOT: "${CI_PROJECT_DIR}/ansible"
  TF_PLUGIN_CACHE_DIR: "${TF_ROOT}/.terraform.d/plugin-cache"
  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/production"
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
  ANSIBLE_CONFIG: "${ANSIBLE_ROOT}/ansible.cfg"
  TF_VAR_ssh_key: "${PUBLIC_SSH_KEY_PATH}"
  ANSIBLE_HOST_KEY_CHECKING: "False"

# --- Validation Jobs ---

terraform_validate:
  stage: validate
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd "${TF_ROOT}"
    - terraform init -backend=false
    - terraform fmt -check -recursive
    - terraform validate

terraform_tflint:
  stage: validate
  image:
    name: ${TFLINT_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd "${TF_ROOT}"
    - tflint --init
    - tflint --recursive

terraform_tfsec:
  stage: validate
  image:
    name: ${TFSEC_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - tfsec "${TF_ROOT}"

terraform_checkov:
  stage: validate
  image:
    name: ${CHECKOV_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - checkov -d "${TF_ROOT}" --framework terraform

ansible_yamllint:
  stage: validate
  image:
    name: ${YAMLLINT_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - yamllint "${ANSIBLE_ROOT}"

ansible_lint:
  stage: validate
  image: 
    name: ${ANSIBLE_LINT_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  before_script:
    - cd "${ANSIBLE_ROOT}"
  script:
    - ansible-lint site.yml

ansible_syntax_check:
  stage: validate
  image: 
    name: ${ANSIBLE_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd "${ANSIBLE_ROOT}"
    - ansible-playbook site.yml --syntax-check

ansible_checkov:
  stage: validate
  image:
    name: ${CHECKOV_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - checkov -d "${ANSIBLE_ROOT}" --framework ansible

terraform_plan:
  stage: plan
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd "${TF_ROOT}"
    - >
      terraform init
      -backend-config="address=${TF_ADDRESS}"
      -backend-config="lock_address=${TF_ADDRESS}/lock"
      -backend-config="unlock_address=${TF_ADDRESS}/lock"
      -backend-config="lock_method=POST"
      -backend-config="unlock_method=DELETE"
      -backend-config="retry_wait_min=5"
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan
    expire_in: 1 hour

terraform_apply:
  stage: apply
  image:
    name: ${TF_IMAGE}
    entrypoint: [""]
  tags:
    - cluster-runner
  before_script:
    - apk add --no-cache cdrkit
  script:
    - cd "${TF_ROOT}"
    - >
      terraform init
      -backend-config="address=${TF_ADDRESS}"
      -backend-config="lock_address=${TF_ADDRESS}/lock"
      -backend-config="unlock_address=${TF_ADDRESS}/lock"
      -backend-config="lock_method=POST"
      -backend-config="unlock_method=DELETE"
      -backend-config="retry_wait_min=5"
    - terraform apply -auto-approve tfplan
    - terraform output -json ansible_inventory > ${ANSIBLE_ROOT}/inventory.json
    - cat ${ANSIBLE_ROOT}/inventory.json
  rules:    
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: false  
  dependencies:
    - terraform_plan
  artifacts:
    paths:
      - ${ANSIBLE_ROOT}/inventory.json

configure_k8s:
  stage: configuration
  image: willhallonline/ansible:latest 
  needs:
    - job: terraform_apply 
      artifacts: true
  before_script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - echo "Running Ansible Playbook..."
    - ansible-playbook -i inventory.json site.yml
