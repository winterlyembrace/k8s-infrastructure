stages:
  - validate
  - plan
  - apply
  - provision

variables:
  TF_ROOT: "terraform"
  ANSIBLE_ROOT: "ansible"
  ANSIBLE_HOST_KEY_CHECKING: "False"
  TERRAFORM_VER: "1.7.5"
  ANSIBLE_VER: "2.16"
  ANSIBLE_LINT_VER: "24.2.0"

terraform_validate:
  stage: validate
  image:
    name: hashicorp/terraform:${TERRAFORM_VER}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

ansible_lint:
  stage: validate
  image: monitorial/ansible-lint:${ANSIBLE_LINT_VER}
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - ansible-lint site.yml

terraform_plan:
  stage: plan
  image:
    name: hashicorp/terraform:${TERRAFORM_VER}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan
    expire_in: 1 hour

terraform_apply:
  stage: apply
  image:
    name: hashicorp/terraform:${TERRAFORM_VER}
    entrypoint: [""]
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform apply -auto-approve tfplan
    - terraform output -json ansible_inventory > ../$ANSIBLE_ROOT/inventory.json  
  when: manual
  allow_failure: false  
  dependencies:
    - terraform_plan
  artifacts:
    paths:
      - $ANSIBLE_ROOT/inventory.json

ansible_run:
  stage: provision
  image: cytopia/ansible:${ANSIBLE_VER}
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - sleep 30 
    - ansible-playbook -i inventory.json site.yml --private-key=$SSH_PRIVATE_KEY
  dependencies:
    - terraform_apply
