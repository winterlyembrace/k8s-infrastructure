stages:
  - validate
  - plan
  - apply
  - provision

variables:
  TF_ROOT: "./terraform"
  ANSIBLE_ROOT: "./ansible"

terraform_validate:
  stage: validate
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

ansible_lint:
  stage: validate
  tags:
    - cluster-runner
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - sudo -E apt-get update -y
    - sudo -E apt-get install -y python3-venv
    - python3 -m venv venv
    - source venv/bin/activate
    - pip install ansible-lint ansible
  script:
    - cd $ANSIBLE_ROOT
    - ansible-lint site.yml

terraform_plan:
  stage: plan
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan
    expire_in: 1 hour

terraform_apply:
  stage: apply
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform apply -auto-approve tfplan
    - terraform output -json ansible_inventory > ../ansible/inventory.json  
  when: manual
  allow_failure: false  
  dependencies:
    - terraform_plan
  artifacts:
    paths:
      - $ANSIBLE_ROOT/inventory.json

ansible_run:
  stage: provision
  tags:
    - cluster-runner
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - sudo -E apt-get update -y
    - sudo -E apt-get install -y python3-venv
    - source venv/bin/activate || python3 -m venv venv && source venv/bin/activate
    - pip install ansible
  script:
    - cd $ANSIBLE_ROOT
    - sleep 30 
    - ansible-playbook -i inventory.json site.yml --private-key=$SSH_PRIVATE_KEY
  dependencies:
    - terraform_apply
    - terraform_plan
