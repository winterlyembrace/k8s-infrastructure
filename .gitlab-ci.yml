stages:
  - validate
  - plan
  - apply
  - provision

variables:
  TF_ROOT: "./terraform"
  ANSIBLE_ROOT: "./ansible"

terraform_validate:
  stage: validate
  image: hashicorp/terraform:light
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

ansible_lint:
  stage: validate
  image: monitorial/ansible-lint:latest
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - ansible-lint site.yml

terraform_plan:
  stage: plan
  image: hashicorp/terraform:light
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan
    expire_in: 1 hour

terraform_apply:
  stage: apply
  image: hashicorp/terraform:light
  tags:
    - cluster-runner
  script:
    - cd $TF_ROOT
    - terraform apply -auto-approve tfplan
    - terraform output -json ansible_inventory > ../$ANSIBLE_ROOT/inventory.json  
  when: manual
  allow_failure: false  
  dependencies:
    - terraform_plan
  artifacts:
    paths:
      - $ANSIBLE_ROOT/inventory.json

ansible_run:
  stage: provision
  image: alpine/ansible:latest
  tags:
    - cluster-runner
  script:
    - cd $ANSIBLE_ROOT
    - sleep 30 
    - ansible-playbook -i inventory.json site.yml --private-key=$SSH_PRIVATE_KEY
  dependencies:
    - terraform_apply
